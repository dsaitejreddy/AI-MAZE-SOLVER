<!DOCTYPE html>
<html>
<head>
    <title>AI Maze Solver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🧠 AI Maze Solver (Comparison)</h1>

<div class="container">

    <div class="box">
        <h2 class="bfs">BFS</h2>
        <canvas id="bfsCanvas"></canvas>
    </div>

    <div class="box">
        <h2 class="dfs">DFS</h2>
        <canvas id="dfsCanvas"></canvas>
    </div>

    <div class="box">
        <h2 class="astar">A*</h2>
        <canvas id="astarCanvas"></canvas>
    </div>

</div>

<div class="controls">
    <button onclick="setMode('start')">Set Start</button>
    <button onclick="setMode('end')">Set End</button>
    <button onclick="runAll()">Run All</button>
    <button onclick="resetAll()">Reset</button>
</div>

<script src="script.js"></script>

</body>
</html>
